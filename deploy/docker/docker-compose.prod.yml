# =============================================================================
# ForexBot — Production Docker Compose Override
# =============================================================================
# Extends docker-compose.yml with:
#   - Nginx reverse proxy (HTTPS, WebSocket, rate limiting)
#   - Certbot for Let's Encrypt SSL
#   - Prometheus monitoring
#   - Resource limits per container
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy (HTTPS + WebSocket + Security)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: forexbot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ssl-certs:/etc/letsencrypt
      - ssl-www:/var/www/certbot
      - ../nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
      - ../nginx/rate-limit.conf:/etc/nginx/rate-limit.conf:ro
    depends_on:
      - backend
      - frontend
    logging: *default-logging
    networks:
      - forexbot-network

  # ---------------------------------------------------------------------------
  # Certbot — Let's Encrypt SSL Auto-Renewal
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:v2.9
    container_name: forexbot-certbot
    entrypoint: /bin/sh
    command:
      - -c
      - |
        certbot certonly --webroot -w /var/www/certbot \
          --email "$${SSL_EMAIL}" \
          -d "$${DOMAIN_NAME}" \
          --non-interactive --agree-tos \
          --keep-until-expiring || true
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet --no-self-upgrade
          sleep 43200
        done
    volumes:
      - ssl-certs:/etc/letsencrypt
      - ssl-www:/var/www/certbot
    depends_on:
      - nginx
    logging: *default-logging
    networks:
      - forexbot-network

  # ---------------------------------------------------------------------------
  # Backend — Production overrides
  # ---------------------------------------------------------------------------
  backend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      - DEBUG_MODE=false

  # ---------------------------------------------------------------------------
  # Frontend — Production overrides
  # ---------------------------------------------------------------------------
  frontend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  ssl-certs:
    name: forexbot-ssl-certs
  ssl-www:
    name: forexbot-ssl-www
